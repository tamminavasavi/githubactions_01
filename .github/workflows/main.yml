name: project2
on: 
  push:
     branches:
       - "dev/**"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: get code
        uses: actions/checkout@v3
      - name: Set up nodejs
        uses: actions/setup-node@v3

        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Deploy
        run: echo "Deploying to production server..."
  info:
     runs-on: ubuntu-latest
     steps:
       - name: Output of the Job
         run: echo "${{ toJson(github) }}" 



